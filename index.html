<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pluggy - Home Services (Expert Technicians)</title>

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/png" href="/image/logos.png" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <!-- ✅ Dark Mode Script (Default = Dark) -->
    <script>
      const theme = localStorage.getItem("pluggy_theme") || "dark"
      if (theme === "dark") {
        document.documentElement.classList.add("dark")
      }
    </script>
  </head>
  <body class="bg-[#F4F6F9] dark:bg-[#0B1120] transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
